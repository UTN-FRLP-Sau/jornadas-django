{% extends 'charlas/base_admin.html' %}
{% with force_white_nav=True %}
{% block admin_content  %}
<div class="container-xxl py-5" style="padding-top: 100px !important;">
    <div class="container py-5 px-lg-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="mb-5 text-center">
                    <h5 class="text-primary-gradient fw-medium">Administración</h5>
                    <h1 class="mb-0">Configurar Certificados</h1>
                </div>

                <div class="card p-4 p-md-5">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold">{{ form.modalidad.label }}</label>
                            {{ form.modalidad }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">{{ form.minimo.label }}</label>
                            {{ form.minimo }}
                        </div>
                        <div class="mb-4 form-check">
                            {{ form.requiere_magistral }}
                            <label class="form-check-label fw-bold">{{ form.requiere_magistral.label }}</label>
                        </div>
                        <div class="d-flex justify-content-between mt-5">
                            <a href="{% url 'certificate_dashboard' %}" class="btn btn-outline-secondary py-2 px-4 rounded-pill">Cancelar</a>
                            <button type="submit" class="btn btn-primary-gradient py-2 px-4 rounded-pill">Guardar Configuración</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% endwith %}
