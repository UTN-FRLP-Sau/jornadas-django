{% extends 'charlas/base.html' %}
{% with force_white_nav=True %}
{% block content %}
<div class="container-xxl py-5" style="padding-top: 100px !important;">
    <div class="container py-5 px-lg-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <div class="mb-4">
                    <div class="d-flex justify-content-between small text-muted mb-1">
                        <span>Paso {{ step }} de {{ total_steps }}</span>
                    </div>
                    <div class="progress" style="height:8px;">
                        <div class="progress-bar bg-primary" style="width: {% widthratio step total_steps 100 %}%"></div>
                    </div>
                </div>

                <div class="card p-4 p-md-5 shadow-sm border-0">
                    <h4 class="mb-4 text-primary fw-bold">Datos Generales</h4>
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-bold">Carrera</label>
                            <select name="carrera" class="form-select" required>
                                <option value="">Seleccioná tu carrera</option>
                                <option value="Industrial">Ingeniería Industrial</option>
                                <option value="Sistemas">Ingeniería en Sistemas de Información</option>
                                <option value="Mecánica">Ingeniería Mecánica</option>
                                <option value="Química">Ingeniería Química</option>
                                <option value="Civil">Ingeniería Civil</option>
                                <option value="Eléctrica">Ingeniería en Energía Eléctrica</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">¿Qué año/s cursás?</label>
                            <select name="anio_cursada" class="form-select" required>
                                <option value="">Seleccioná tu año</option>
                                <option value="1°">1°</option>
                                <option value="2°">2°</option>
                                <option value="3°">3°</option>
                                <option value="4°">4°</option>
                                <option value="5°">5°</option>
                                <option value="6°">6°</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'survey_step' dni=cert.dni step=1 %}" class="btn btn-outline-secondary rounded-pill px-4">Anterior</a>
                            <button type="submit" class="btn btn-primary-gradient rounded-pill px-4">Siguiente <i class="fa fa-arrow-right ms-2"></i></button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
{% endwith %}
